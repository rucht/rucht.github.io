<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wordle — Fortunately</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--surface:#12161e;--surface2:#1c2230;
  --border:rgba(255,255,255,.08);--text:#e8edf5;--muted:#6b7a94;
  --accent:#f59e0b;--correct:#22c55e;--present:#f59e0b;
  --absent:#2a3040;--absent-txt:#4a5568;--key:#2a3040;--r:14px;
}
html,body{height:100%}
body{font-family:"Poppins",sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background-image:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(245,158,11,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(34,197,94,.05) 0%,transparent 60%);}
/* AUTH */
#auth-overlay{display:flex;position:fixed;inset:0;background:var(--bg);z-index:9999;
  align-items:center;justify-content:center;flex-direction:column;gap:22px;
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(245,158,11,.1) 0%,transparent 60%);}
.auth-logo{font-family:"Space Mono",monospace;font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:3px}
.auth-sub{font-size:.85rem;color:var(--muted)}
#user-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:460px;width:92%}
.user-btn{padding:13px 8px;border:none;border-radius:12px;font-weight:700;font-size:.95rem;
  cursor:pointer;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7);
  box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform .2s,box-shadow .2s;font-family:"Poppins",sans-serif;}
.user-btn:hover{transform:translateY(-4px) scale(1.06);box-shadow:0 12px 28px rgba(0,0,0,.55)}
/* TOPBAR (Z-index artırıldı) */
#topbar{width:100%;height:56px;background:rgba(10,12,16,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;position:sticky;top:0;z-index:2000;gap:8px;}
.back-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:20px;cursor:pointer;font-size:.78rem;font-family:"Poppins",sans-serif;
  transition:.2s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.back-btn:hover{background:rgba(255,255,255,.12)}
.top-logo{font-family:"Space Mono",monospace;font-weight:700;font-size:1rem;color:var(--accent);letter-spacing:2px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
#user-chip{padding:5px 12px;border-radius:20px;font-weight:700;font-size:.8rem;color:#fff;white-space:nowrap;}
#admin-btn{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);
  color:var(--accent);padding:6px 11px;border-radius:20px;cursor:pointer;
  font-size:.75rem;font-family:"Poppins",sans-serif;font-weight:600;transition:.2s;white-space:nowrap;}
#admin-btn:hover{background:rgba(245,158,11,.28);border-color:var(--accent)}
#lb-btn{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:var(--correct);
  padding:6px 11px;border-radius:20px;cursor:pointer;font-size:.75rem;font-weight:600;transition:.2s;white-space:nowrap;font-family:"Poppins",sans-serif;}
#lb-btn:hover{background:rgba(34,197,94,.28);}
/* PROGRESS */
#progress-wrap{width:100%;max-width:560px;padding:18px 20px 0}
#q-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.q-num{font-family:"Space Mono",monospace;font-weight:700;font-size:.85rem;color:var(--accent)}
.q-score{font-family:"Space Mono",monospace;font-weight:700;font-size:.85rem;color:var(--muted)}
.progress-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;display:flex;gap:3px}
.progress-seg{flex:1;height:100%;border-radius:3px;background:var(--surface2);transition:background .4s}
.progress-seg.done-win{background:var(--correct)}.progress-seg.done-fail{background:#ef4444}
.progress-seg.active{background:var(--accent);animation:pulse-seg 1.2s ease infinite}
@keyframes pulse-seg{0%,100%{opacity:1}50%{opacity:.55}}
/* GAME */
#game-wrap{width:100%;max-width:560px;padding:20px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:16px}
#board{display:grid;grid-template-rows:repeat(6,1fr);gap:5px}
.row{display:flex;gap:5px}
.tile{width:56px;height:56px;border:2px solid var(--surface2);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-family:"Space Mono",monospace;
  font-size:1.55rem;font-weight:700;text-transform:uppercase;background:var(--surface);
  transition:border-color .1s;user-select:none;}
.tile.filled{border-color:rgba(255,255,255,.2)}.tile.active-cursor{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.tile.shake{animation:shake .38s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.tile.flip{animation:flip .48s ease forwards}
@keyframes flip{0%{transform:rotateX(0)}49%{transform:rotateX(-90deg)}50%{transform:rotateX(-90deg)}100%{transform:rotateX(0)}}
.tile.correct{background:var(--correct);border-color:var(--correct);color:#fff}
.tile.present{background:var(--present);border-color:var(--present);color:#111}
.tile.absent{background:var(--absent);border-color:var(--absent);color:var(--absent-txt)}
/* KEYBOARD */
#keyboard{display:flex;flex-direction:column;gap:6px;align-items:center;width:100%}
.kb-row{display:flex;gap:4px;justify-content:center}
.key{height:50px;min-width:34px;padding:0 5px;border-radius:8px;border:none;
  background:var(--key);color:var(--text);font-family:"Poppins",sans-serif;font-weight:700;font-size:.78rem;
  cursor:pointer;transition:background .15s,transform .08s,color .15s;
  display:flex;align-items:center;justify-content:center;user-select:none;}
.key:hover{background:#374151;transform:translateY(-1px)}.key:active{transform:scale(.93)}
.key.wide{min-width:58px;font-size:.7rem}
.key.correct{background:var(--correct);color:#fff}.key.present{background:var(--present);color:#111}
.key.absent{background:#1a2030;color:#2a3040}
/* RESULT CARD */
#result-card{display:none;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 20px;text-align:center;width:100%;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.rc-emoji{font-size:2rem;margin-bottom:4px}.rc-title{font-weight:800;font-size:1.1rem;margin-bottom:2px}
.rc-pts{font-family:"Space Mono",monospace;color:var(--accent);font-size:1.3rem;font-weight:700}
.rc-word{font-family:"Space Mono",monospace;font-size:1rem;color:var(--correct);letter-spacing:3px;font-weight:700;margin-top:6px}
/* NEXT BTN */
#next-btn{display:none;background:linear-gradient(135deg,var(--correct),#16a34a);
  color:#fff;border:none;padding:13px 36px;border-radius:30px;font-weight:700;font-size:1rem;
  font-family:"Poppins",sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(34,197,94,.35);
  transition:transform .2s,box-shadow .2s;letter-spacing:.5px;animation:fadeUp .4s ease;}
#next-btn:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(34,197,94,.5)}
#next-btn:active{transform:scale(.96)}
/* FINISH / MODALS (Marginler topbar'ı engellemeyecek şekilde güncellendi) */
#finish-screen{display:none;position:fixed;inset:0;background:rgba(10,12,16,.97);
  backdrop-filter:blur(12px);z-index:800;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:20px;}
#finish-screen.on{display:flex}
.fs-inner{max-width:560px;width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:28px;box-shadow:0 16px 60px rgba(0,0,0,.7);margin:76px auto 40px;}
.fs-title{font-family:"Space Mono",monospace;font-size:1.4rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:4px;letter-spacing:2px}
.fs-sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:20px}
.fs-score-big{text-align:center;font-family:"Space Mono",monospace;font-size:3rem;font-weight:700;color:var(--accent);line-height:1;margin-bottom:4px}
.fs-score-label{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:24px}
/* REVIEW */
.review-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.rv-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .2s;}
.rv-item:hover{border-color:rgba(255,255,255,.18)}
.rv-hdr{display:flex;align-items:center;gap:10px}
.rv-num{font-family:"Space Mono",monospace;font-weight:700;font-size:.78rem;color:var(--muted);width:20px;flex-shrink:0}
.rv-word{font-family:"Space Mono",monospace;font-weight:700;font-size:.88rem;letter-spacing:2px;flex:1}
.rv-badge{padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700;flex-shrink:0}
.rv-badge.win{background:rgba(34,197,94,.15);color:var(--correct);border:1px solid rgba(34,197,94,.3)}
.rv-badge.fail{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.rv-pts{font-family:"Space Mono",monospace;color:var(--accent);font-size:.82rem;font-weight:700;flex-shrink:0}
.rv-chevron{color:var(--muted);font-size:.7rem;transition:transform .2s;margin-left:6px}
.rv-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.rv-item.expanded .rv-body{display:block}.rv-item.expanded .rv-chevron{transform:rotate(180deg)}
.rv-board{display:flex;flex-direction:column;gap:3px}.rv-row{display:flex;gap:3px}
.rv-tile{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-family:"Space Mono",monospace;font-size:.8rem;font-weight:700;text-transform:uppercase}
.rv-tile.c{background:var(--correct);color:#fff}.rv-tile.p{background:var(--present);color:#111}
.rv-tile.a{background:var(--absent);color:var(--absent-txt)}
/* LB */
.fs-lb-title{font-weight:700;font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;text-align:center}
.fs-lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;
  cursor:pointer;transition:border-color .2s,background .2s;}
.fs-lb-row:hover{border-color:rgba(255,255,255,.22);background:#222a38}
.fs-lb-row.you{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.06)}
.fs-lb-rank{font-family:"Space Mono",monospace;font-size:.8rem;font-weight:700;width:24px;text-align:center;color:var(--muted);flex-shrink:0}
.fs-lb-rank.g{color:#fbbf24}.fs-lb-rank.s{color:#94a3b8}.fs-lb-rank.b{color:#b45309}
.fs-lb-badge{padding:4px 11px;border-radius:8px;font-size:.75rem;font-weight:700;flex-shrink:0}
.fs-lb-info{flex:1;min-width:0}
.fs-lb-name{font-weight:700;font-size:.88rem}.fs-lb-sub{font-size:.65rem;color:var(--muted)}
.fs-lb-pts{font-family:"Space Mono",monospace;font-size:.95rem;font-weight:700;color:var(--accent)}
.fs-lb-eye{font-size:.95rem;flex-shrink:0;opacity:.5;transition:opacity .15s}
.fs-lb-row:hover .fs-lb-eye{opacity:1}
/* REPLAY MODAL */
#replay-modal{display:none;position:fixed;inset:0;background:rgba(10,12,16,.97);
  backdrop-filter:blur(16px);z-index:1200;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:20px;}
#replay-modal.on{display:flex}
.rm-inner{max-width:560px;width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:24px;box-shadow:0 16px 60px rgba(0,0,0,.8);margin:76px auto 40px;animation:fadeUp .3s ease;}
.rm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px}
.rm-title{font-family:"Space Mono",monospace;font-weight:700;font-size:1rem;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rm-close{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);
  padding:6px 13px;border-radius:16px;cursor:pointer;font-size:.78rem;font-family:"Poppins",sans-serif;transition:.2s;flex-shrink:0;}
.rm-close:hover{background:rgba(255,255,255,.12);color:var(--text)}
.rm-score-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:12px 14px;
  background:var(--surface2);border-radius:10px;border:1px solid var(--border);flex-wrap:wrap;}
.rm-badge-lg{padding:5px 13px;border-radius:8px;font-size:.82rem;font-weight:700;flex-shrink:0}
.rm-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.rm-stat-val{font-family:"Space Mono",monospace;font-size:1.1rem;font-weight:700;color:var(--accent)}
.rm-stat-label{font-size:.6rem;color:var(--muted);text-align:center}
.rm-questions{display:flex;flex-direction:column;gap:8px}
.rm-q-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .2s}
.rm-q-item:hover{border-color:rgba(255,255,255,.18)}
.rm-q-hdr{display:flex;align-items:center;gap:10px}
.rm-q-num{font-family:"Space Mono",monospace;font-size:.78rem;color:var(--muted);width:20px;flex-shrink:0}
.rm-q-word{font-family:"Space Mono",monospace;font-weight:700;font-size:.88rem;letter-spacing:2px;flex:1}
.rm-q-badge{padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700;flex-shrink:0}
.rm-q-badge.win{background:rgba(34,197,94,.15);color:var(--correct);border:1px solid rgba(34,197,94,.3)}
.rm-q-badge.fail{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.rm-q-badge.ns{background:rgba(107,122,148,.1);color:var(--muted);border:1px solid rgba(107,122,148,.2)}
.rm-q-pts{font-family:"Space Mono",monospace;color:var(--accent);font-size:.82rem;font-weight:700;flex-shrink:0}
.rm-q-chev{color:var(--muted);font-size:.7rem;transition:transform .2s;margin-left:6px}
.rm-q-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.rm-q-item.expanded .rm-q-body{display:block}.rm-q-item.expanded .rm-q-chev{transform:rotate(180deg)}
.rm-board{display:flex;flex-direction:column;gap:3px}.rm-row{display:flex;gap:3px}
.rm-tile{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-family:"Space Mono",monospace;font-size:.8rem;font-weight:700;text-transform:uppercase}
.rm-tile.c{background:var(--correct);color:#fff}.rm-tile.p{background:var(--present);color:#111}
.rm-tile.a{background:var(--absent);color:var(--absent-txt)}
.rm-loading{text-align:center;padding:40px;color:var(--muted);font-size:.85rem}
.rm-no-data{text-align:center;padding:24px;color:var(--muted);font-size:.85rem;
  background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
/* ADMIN */
#admin-modal{display:none;position:fixed;inset:0;background:rgba(10,12,16,.97);
  backdrop-filter:blur(16px);z-index:1300;align-items:center;justify-content:center;
  padding:20px;overflow-y:auto;}
#admin-modal.on{display:flex}
.am-inner{max-width:480px;width:100%;background:var(--surface);border:1px solid rgba(245,158,11,.3);
  border-radius:20px;padding:28px;box-shadow:0 16px 60px rgba(0,0,0,.8);margin:76px auto 40px;animation:fadeUp .3s ease;}
.am-title{font-family:"Space Mono",monospace;font-size:1.1rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:6px;letter-spacing:2px}
.am-sub{text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:20px}
.am-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);font-family:"Space Mono",monospace;font-size:.95rem;outline:none;transition:border-color .2s;}
.am-input:focus{border-color:var(--accent)}
.am-btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;font-size:.9rem;
  font-family:"Poppins",sans-serif;cursor:pointer;transition:.2s;margin-top:10px;}
.am-btn.primary{background:var(--accent);color:#111}.am-btn.primary:hover{background:#e08a00}
.am-btn.primary:disabled{opacity:.5;cursor:not-allowed}
.am-btn.ghost{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)}
.am-btn.ghost:hover{background:rgba(255,255,255,.1);color:var(--text)}
.am-word-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.am-word-row{display:flex;align-items:center;gap:8px}
.am-word-label{font-family:"Space Mono",monospace;font-size:.72rem;color:var(--muted);width:56px;flex-shrink:0}
.am-word-input{flex:1;background:var(--surface2);border:2px solid var(--border);border-radius:8px;
  padding:8px 11px;color:var(--text);font-family:"Space Mono",monospace;font-size:.9rem;
  outline:none;text-transform:lowercase;transition:border-color .2s;letter-spacing:1px;}
.am-word-input:focus{border-color:var(--accent)}
.am-word-input.ok{border-color:var(--correct)}.am-word-input.err{border-color:#ef4444}
.am-word-count{font-family:"Space Mono",monospace;font-size:.68rem;width:22px;text-align:center;flex-shrink:0;color:var(--muted)}
.am-warning{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  border-radius:8px;padding:10px 14px;font-size:.78rem;color:#ef4444;text-align:center;margin-bottom:12px;}
/* TOAST */
#toast-wrap{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:rgba(232,237,245,.96);color:#0a0c10;padding:9px 22px;border-radius:22px;
  font-size:.84rem;font-weight:700;box-shadow:0 4px 18px rgba(0,0,0,.5);animation:toastIn .22s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@media(max-width:480px){
  .tile{width:46px;height:46px;font-size:1.2rem}.key{height:44px;min-width:28px;font-size:.7rem}
  .key.wide{min-width:50px}#game-wrap{padding:14px 12px 36px}#progress-wrap{padding:14px 12px 0}
  #admin-btn{font-size:.68rem;padding:5px 8px}
}
</style>
</head>
<body>
<div id="auth-overlay">
  <div style="font-size:2.2rem">⬛🟨🟩</div>
  <div class="auth-logo">WORDLE</div>
  <div class="auth-sub">Kim oynuyor?</div>
  <div id="user-grid"></div>
</div>
<div id="toast-wrap"></div>
<div id="topbar">
  <button class="back-btn" onclick="window.location.href='index.html'">← Ana Sayfa</button>
  <div class="top-logo">WORDLE</div>
  <div class="topbar-right">
    <button id="lb-btn">🏆 Sıralama</button>
    <button id="admin-btn">⚙️ Kelimeler</button>
    <div id="user-chip">—</div>
  </div>
</div>
<div id="progress-wrap">
  <div id="q-label">
    <span class="q-num" id="q-num-label">Soru 1 / 10</span>
    <span class="q-score" id="q-score-label">0 puan</span>
  </div>
  <div class="progress-track" id="progress-track"></div>
</div>
<div id="game-wrap">
  <div id="board"></div>
  <div id="result-card">
    <div class="rc-emoji" id="rc-emoji">🎉</div>
    <div class="rc-title" id="rc-title">Harika!</div>
    <div class="rc-pts" id="rc-pts">+5 puan</div>
    <div class="rc-word" id="rc-word"></div>
  </div>
  <button id="next-btn">Sonraki Soru →</button>
  <div id="keyboard"></div>
</div>
<div id="finish-screen">
  <div class="fs-inner" style="position:relative">
    <button class="rm-close" style="position:absolute;top:20px;right:20px" onclick="document.getElementById('finish-screen').classList.remove('on')">✕</button>
    <div class="fs-title">🏁 BİTTİ!</div>
    <div class="fs-sub">10 soruyu tamamladın</div>
    <div class="fs-score-big" id="fs-total">0</div>
    <div class="fs-score-label">/ 60 puan</div>
    <div class="review-list" id="review-list"></div>
    <div class="fs-lb-title">🏆 Genel Puan Tablosu</div>
    <div id="fs-lb"></div>
  </div>
</div>
<div id="replay-modal">
  <div class="rm-inner">
    <div class="rm-header">
      <div class="rm-title" id="rm-title">Oyun Tekrarı</div>
      <button class="rm-close" onclick="closeReplay()">✕ Kapat</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";

import { getDatabase, ref, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const FB={apiKey:"AIzaSyCUTBQ5oIgF1GEU8rGj9Mxqz7a2g1Ecswk",authDomain:"timetemp-9b1a5.firebaseapp.com",
  databaseURL:"https://timetemp-9b1a5-default-rtdb.firebaseio.com/",projectId:"timetemp-9b1a5",

/* SESSION */
function freshSession(){
  return{v:SESSION_VER,q:WORDS.map(()=>({guesses:[],done:false,won:false,pts:0})),total:0,cur:0,finished:false};
}
function loadSession(){
  try{
    const s=JSON.parse(localStorage.getItem(SESSION_KEY)||"null");
    if(!s||s.v!==SESSION_VER||!s.q||s.q.length!==WORDS.length) return null;
    return s;
  }catch{return null}
}
function save(){localStorage.setItem(SESSION_KEY,JSON.stringify(session))}

let session=null,currentGuess="",qDone=false;

/* PROGRESS */
function buildProgress(){
  const t=document.getElementById("progress-track");t.innerHTML="";
  for(let i=0;i<WORDS.length;i++){
    const s=document.createElement("div");s.className="progress-seg";s.id=`seg-${i}`;t.appendChild(s);
  }
}
function updateProgress(){
  const cur=session.cur;
  for(let i=0;i<WORDS.length;i++){
    const s=document.getElementById(`seg-${i}`);if(!s)continue;
    const qd=session.q[i];
    if(i<cur) s.className="progress-seg "+(qd.won?"done-win":"done-fail");
    else if(i===cur&&!session.finished) s.className="progress-seg active";
    else s.className="progress-seg";
  }
  document.getElementById("q-num-label").textContent=
    session.finished?"Tamamlandı ✓":`Soru ${cur+1} / ${WORDS.length}`;
  document.getElementById("q-score-label").textContent=`${session.total} puan`;
}

/* BOARD */
function buildBoard(){
  const b=document.getElementById("board");b.innerHTML="";
  for(let r=0;r<6;r++){
    const row=document.createElement("div");row.className="row";row.id=`row-${r}`;
    for(let c=0;c<5;c++){
      const t=document.createElement("div");t.className="tile";t.id=`t-${r}-${c}`;row.appendChild(t);
    }
    b.appendChild(row);
  }
}
function clearBoard(){
  for(let r=0;r<6;r++) for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${r}-${c}`);if(t){t.className="tile";t.textContent=""}
  }
}
function renderSaved(guesses,target){
  guesses.forEach((g,ri)=>{
    const res=scoreGuess(g,target);
    g.split("").forEach((ch,ci)=>{
      const t=document.getElementById(`t-${ri}-${ci}`);if(!t)return;
      t.textContent=ch.toLocaleUpperCase("tr");t.classList.add(res[ci]);
    });
  });
  updateKeys(guesses,target);
}

/* KEYBOARD */
const TR_KB=[
  ["e","r","t","y","u","ı","o","p","ğ","ü"],
  ["a","s","d","f","g","h","j","k","l","ş","i"],
  ["ENTER","z","x","c","v","b","n","m","ö","ç","⌫"]
];
function buildKeyboard(){
  const kb=document.getElementById("keyboard");kb.innerHTML="";
  TR_KB.forEach(row=>{
    const rowEl=document.createElement("div");rowEl.className="kb-row";
    row.forEach(k=>{
      const btn=document.createElement("button");btn.className="key";
      if(k==="ENTER"||k==="⌫") btn.classList.add("wide");
      btn.textContent=k;btn.dataset.key=k;
      btn.addEventListener("click",()=>handleKey(k));
      rowEl.appendChild(btn);
    });
    kb.appendChild(rowEl);
  });
}
function clearKeys(){
  document.querySelectorAll(".key").forEach(b=>{
    b.className="key";if(b.dataset.key==="ENTER"||b.dataset.key==="⌫") b.classList.add("wide");
  });
}
function updateKeys(guesses,target){
  const map={};
  guesses.forEach(g=>{
    const r=scoreGuess(g,target);
    g.split("").forEach((ch,i)=>{
      if(r[i]==="correct") map[ch]="correct";
      else if(r[i]==="present"&&map[ch]!=="correct") map[ch]="present";
      else if(!map[ch]) map[ch]="absent";
    });
  });
  document.querySelectorAll(".key").forEach(btn=>{
    const k=btn.dataset.key;
    if(map[k]){btn.className="key";if(k==="ENTER"||k==="⌫") btn.classList.add("wide");btn.classList.add(map[k])}
  });
}

/* SCORING */
function scoreGuess(guess,target){
  const res=Array(5).fill("absent");
  const ta=target.split("");const used=Array(5).fill(false);
  for(let i=0;i<5;i++) if(guess[i]===target[i]){res[i]="correct";used[i]=true}
  for(let i=0;i<5;i++){
    if(res[i]==="correct")continue;
    for(let j=0;j<5;j++){if(!used[j]&&guess[i]===ta[j]){res[i]="present";used[j]=true;break}}
  }
  return res;
}
function calcPts(attempts,won){return won?Math.max(1,7-attempts):0}

/* LOAD Q */
function loadQuestion(qi){
  const qd=session.q[qi];const target=WORDS[qi];
  clearBoard();clearKeys();currentGuess="";qDone=qd.done;
  document.getElementById("result-card").style.display="none";
  document.getElementById("next-btn").style.display="none";
  if(qd.guesses.length) renderSaved(qd.guesses,target);
  const kb=document.getElementById("keyboard");
  if(qd.done){
    showResultCard(qi,false);if(!session.finished) showNextBtn(qi);
    kb.style.opacity=".35";kb.style.pointerEvents="none";
  } else {kb.style.opacity="1";kb.style.pointerEvents="";}
  updateProgress();
}

/* INPUT */
document.addEventListener("keydown",e=>{
  if(authEl.style.display!=="none") return;
  if(document.getElementById("finish-screen").classList.contains("on")) return;
  if(document.getElementById("admin-modal").classList.contains("on")) return;
  if(document.getElementById("replay-modal").classList.contains("on")) return;
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  const k=e.key;
  if(k==="Enter") handleKey("ENTER");
  else if(k==="Backspace") handleKey("⌫");
  else if(/^[a-zA-ZğüşıöçĞÜŞİÖÇ]$/.test(k)) handleKey(k.toLocaleLowerCase("tr"));
});
function handleKey(k){
  if(qDone) return;
  const qd=session.q[session.cur];
  if(k==="⌫"){if(currentGuess.length>0){currentGuess=currentGuess.slice(0,-1);renderCurrent(qd.guesses.length)}}
  else if(k==="ENTER") submitGuess();
  else{if(currentGuess.length<5){currentGuess+=k.toLocaleLowerCase("tr");renderCurrent(qd.guesses.length)}}
}
function renderCurrent(ri){
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${ri}-${c}`);if(!t)return;
    const ch=currentGuess[c]||"";
    t.textContent=ch?ch.toLocaleUpperCase("tr"):"";
    t.className="tile"+(ch?" filled":"")+(c===currentGuess.length&&!ch?" active-cursor":"");
  }
}

/* SUBMIT */
async function submitGuess(){
  const qi=session.cur;const qd=session.q[qi];const target=WORDS[qi];
  if(currentGuess.length<5){shakeRow(qd.guesses.length);toast("5 harf lazım!");return}
  const ri=qd.guesses.length;const res=scoreGuess(currentGuess,target);
  qd.guesses.push(currentGuess);
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${ri}-${c}`);
    await delay(c*80);t.classList.add("flip");await delay(240);
    t.classList.remove("flip","active-cursor","filled");t.classList.add(res[c]);
  }
  updateKeys(qd.guesses,target);currentGuess="";
  for(let c=0;c<5;c++){const t=document.getElementById(`t-${ri+1}-${c}`);if(t) t.className="tile"}
  const won=res.every(r=>r==="correct");
  if(won||qd.guesses.length===6){
    const pts=calcPts(qd.guesses.length,won);
    qd.done=true;qd.won=won;qd.pts=pts;session.total+=pts;qDone=true;save();
    document.getElementById("keyboard").style.opacity=".35";
    document.getElementById("keyboard").style.pointerEvents="none";
    updateProgress();showResultCard(qi,true);
    await saveQuestionReplay(qi);
    if(qi===WORDS.length-1){
      session.finished=true;save();
      await saveScore();
      setTimeout(showFinish,1400);
    } else {showNextBtn(qi);}
  }
}

/* RESULT */
function showResultCard(qi,animate){
  const qd=session.q[qi];const target=WORDS[qi];
  const card=document.getElementById("result-card");
  const winEmojis=["🤯","😎","🔥","👏","👍","😅"];
  const winTitles=["Muhteşem!","Harika!","Süper!","Güzel!","Nefes kesti!","Son nefeste!"];
  document.getElementById("rc-emoji").textContent=qd.won?winEmojis[qd.guesses.length-1]||"🎉":"😢";
  document.getElementById("rc-title").textContent=qd.won?winTitles[qd.guesses.length-1]||"Harika!":"Bulamadın!";
  document.getElementById("rc-pts").textContent=qd.pts>0?`+${qd.pts} puan`:"0 puan";
  const wordEl=document.getElementById("rc-word");
  if(!qd.won){wordEl.textContent=target.toLocaleUpperCase("tr");wordEl.style.display="block"}
  else wordEl.style.display="none";
  card.style.animation=animate?"fadeUp .35s ease":"none";card.style.display="block";
}
function showNextBtn(qi){
  const btn=document.getElementById("next-btn");btn.style.display="inline-block";
  btn.textContent=qi<WORDS.length-2?"Sonraki Soru →":"Sonuçları Gör 🏁";
}
document.getElementById("next-btn").addEventListener("click",()=>{
  if(!qDone) return;
  const qi=session.cur;
  if(qi>=WORDS.length-1){showFinish();return}
  session.cur=qi+1;save();loadQuestion(session.cur);
});

/* FINISH / LEADERBOARD MODAL */
document.getElementById("lb-btn").addEventListener("click", () => {
    showFinish();
});

function showFinish(){
  updateProgress();
  document.getElementById("finish-screen").classList.add("on");
  document.getElementById("fs-total").textContent=session.total;
  const subTitle = document.querySelector(".fs-sub");
  if(session.finished) {
      subTitle.textContent = "10 soruyu tamamladın";
  } else {
      subTitle.textContent = `Şu an ${session.cur + 1}. sorudasın`;
  }
  buildReview();listenLB();
}
function buildReview(){
  const list=document.getElementById("review-list");list.innerHTML="";
  WORDS.forEach((word,i)=>{
    const qd=session.q[i];
    const item=document.createElement("div");item.className="rv-item";
    const hdr=document.createElement("div");hdr.className="rv-hdr";
    hdr.innerHTML=`<span class="rv-num">${i+1}</span>
      <span class="rv-word">${word.toLocaleUpperCase("tr")}</span>
      <span class="rv-badge ${qd.won?"win":"fail"}">${qd.won?qd.guesses.length+"/6":"✗"}</span>
      <span class="rv-pts">${qd.pts>0?"+"+qd.pts:"0"}pt</span>
      <span class="rv-chevron">▼</span>`;
    const body=document.createElement("div");body.className="rv-body";
    const board=document.createElement("div");board.className="rv-board";
    if(qd.guesses.length){
      qd.guesses.forEach(g=>{
        const res=scoreGuess(g,word);const row=document.createElement("div");row.className="rv-row";
        g.split("").forEach((ch,ci)=>{
          const t=document.createElement("div");t.className=`rv-tile ${res[ci][0]}`;
          t.textContent=ch.toLocaleUpperCase("tr");row.appendChild(t);
        });
        board.appendChild(row);
      });
    } else{board.innerHTML='<span style="font-size:.78rem;color:var(--muted)">Deneme yapılmadı</span>';}
    body.appendChild(board);item.appendChild(hdr);item.appendChild(body);
    item.addEventListener("click",()=>item.classList.toggle("expanded"));
    list.appendChild(item);
  });
}

/* FIREBASE */
async function saveQuestionReplay(qi){
  if(!curUser) return;
  const qd=session.q[qi];
  try{
    await set(ref(db,`wordle_replays/${curUser.name}/q${qi}`),{
      guesses:qd.guesses||[],won:!!qd.won,pts:qd.pts||0
    });
  }catch(e){console.warn("replay err",e)}
}

// FIX: `set` yerine `update` kullanıldı. Böylece bir cihazda sadece 1 soru çözülmüşse,
// diğer cihazda önceden çözülmüş 9 soru Firebase'den silinmiyor.
async function syncAllReplays(){
  if(!curUser) return;
  try{
    const replayData={};
    let hasAny=false;
    session.q.forEach((qd,i)=>{
      if(qd.done){replayData[`q${i}`]={guesses:qd.guesses||[],won:!!qd.won,pts:qd.pts||0};hasAny=true;}
    });
    // Burada `set` kullanılırsa mevcut tüm veriler üzerine yazılır (diğer cihazlardan gelenleri silerdi). `update` sadece ilgili alanları günceller.
    if(hasAny) await update(ref(db,`wordle_replays/${curUser.name}`),replayData);
  }catch(e){console.warn("sync err",e)}
}

async function saveScore(){
  if(!curUser) return;
  try{
    const r=ref(db,`wordle_scores/${curUser.name}`);
    const snap=await get(r);
    const prev=snap.val()||{total:0,played:0,name:curUser.name,color:curUser.color};
    await set(r,{total:(prev.total||0)+session.total,played:(prev.played||0)+1,
      name:curUser.name,color:curUser.color});
  }catch(e){console.warn("score err",e)}
}

let lbListening = false;
function listenLB(){
  if(lbListening) return;
  lbListening = true;
  onValue(ref(db,"wordle_scores"),snap=>renderLB(snap.val()||{}));
}
function renderLB(data){
  const el=document.getElementById("fs-lb");el.innerHTML="";
  const entries=Object.values(data).sort((a,b)=>b.total-a.total);
  if(!entries.length){el.innerHTML='<div style="text-align:center;padding:12px;opacity:.5;font-size:.82rem">Henüz puan yok.</div>';return;}
  const medals=["🥇","🥈","🥉"];const rankCls=["g","s","b"];
  entries.forEach((e,i)=>{
    const row=document.createElement("div");
    row.className="fs-lb-row"+(e.name===curUser?.name?" you":"");
    const fc=LIGHT.has(e.name)?"#000":"#fff";
    row.innerHTML=`
      <div class="fs-lb-rank ${rankCls[i]||""}">${medals[i]||"#"+(i+1)}</div>
      <span class="fs-lb-badge" style="background:${e.color};color:${fc}">${e.name}</span>
      <div class="fs-lb-info">
        <div class="fs-lb-name">${e.name}</div>
        <div class="fs-lb-sub">${e.played} oyun</div>
      </div>
      <div class="fs-lb-pts">${e.total}<span style="font-size:.65rem;color:var(--muted)">pt</span></div>
      <span class="fs-lb-eye">👁</span>`;
    row.addEventListener("click",()=>openReplay(e));
    el.appendChild(row);
  });
}

/* REPLAY VIEWER */
window.closeReplay=function(){document.getElementById("replay-modal").classList.remove("on");}

async function openReplay(player){
  const modal=document.getElementById("replay-modal");
  const content=document.getElementById("rm-content");
  const titleEl=document.getElementById("rm-title");
  const fc=LIGHT.has(player.name)?"#000":"#fff";
  titleEl.innerHTML=`<span class="rm-badge-lg" style="background:${player.color};color:${fc}">${player.name}</span> Oyun Tekrarı`;
  content.innerHTML=`<div class="rm-loading">⏳ Yükleniyor...</div>`;
  modal.classList.add("on");

  const snap=await get(ref(db,`wordle_replays/${player.name}`));
  const rd=snap.val()||{};
  const hasData=Object.keys(rd).length>0;

  let totalPts=0,wonCount=0,playedCount=0;
  for(let i=0;i<WORDS.length;i++){
    const q=rd[`q${i}`];
    if(q&&(q.guesses||[]).length>0){playedCount++;totalPts+=q.pts||0;if(q.won)wonCount++;}
  }

  let html=`<div class="rm-score-row">
    <span class="rm-badge-lg" style="background:${player.color};color:${fc}">${player.name}</span>
    <div class="rm-stat"><div class="rm-stat-val">${hasData?totalPts+"pt":"—"}</div><div class="rm-stat-label">bu tur puanı</div></div>
    <div class="rm-stat"><div class="rm-stat-val" style="color:var(--correct)">${wonCount}</div><div class="rm-stat-label">bulunan</div></div>
    <div class="rm-stat"><div class="rm-stat-val" style="color:#ef4444">${playedCount-wonCount}</div><div class="rm-stat-label">bulunamayan</div></div>
  </div>`;

  if(!hasData){
    html+=`<div class="rm-no-data">🕹️ Bu oyuncu henüz bu turda oynamadı.<br><span style="font-size:.75rem;color:var(--muted)">Oynadıktan sonra verileri burada görünür.</span></div>`;
  } else {
    html+=`<div class="rm-questions">`;
    WORDS.forEach((word,i)=>{
      const q=rd[`q${i}`];
      const guesses=q?(q.guesses||[]):[];
      const won=q?!!q.won:false;
      const pts=q?(q.pts||0):0;
      const played=guesses.length>0;

      let boardHTML=`<div class="rm-board">`;
      if(played){
        guesses.forEach(g=>{
          const res=scoreGuess(g,word);
          boardHTML+=`<div class="rm-row">`;
          g.split("").forEach((ch,ci)=>boardHTML+=`<div class="rm-tile ${res[ci][0]}">${ch.toLocaleUpperCase("tr")}</div>`);
          boardHTML+=`</div>`;
        });
      } else{boardHTML+=`<span style="font-size:.78rem;color:var(--muted)">Henüz oynanmadı</span>`;}
      boardHTML+=`</div>`;

      const badgeCls=!played?"ns":won?"win":"fail";
      const badgeTxt=!played?"—":won?guesses.length+"/6":"✗";

      html+=`<div class="rm-q-item" onclick="this.classList.toggle('expanded')">
        <div class="rm-q-hdr">
          <span class="rm-q-num">${i+1}</span>
          <span class="rm-q-word">${word.toLocaleUpperCase("tr")}</span>
          <span class="rm-q-badge ${badgeCls}">${badgeTxt}</span>
          <span class="rm-q-pts">${pts>0?"+"+pts:"0"}pt</span>
          ${played?'<span class="rm-q-chev">▼</span>':""}
        </div>
        ${played?`<div class="rm-q-body">${boardHTML}</div>`:""}
      </div>`;
    });
    html+=`</div>`;
  }
  content.innerHTML=html;
}

  }
  inner.innerHTML=`
    <div class="am-title">📝 YENİ KELİMELER</div>
    <div class="am-sub">10 soru için 5'er harfli kelimeler girin (Türkçe karakter olabilir)</div>
    <div class="am-word-grid">${rows}</div>
    <div class="am-warning">⚠️ Onaylandığında liderlik tablosu ve tüm oyun verileri sıfırlanacak!</div>
    <button class="am-btn primary" id="am-confirm">✅ Onayla ve Sıfırla</button>
    <button class="am-btn ghost" onclick="closeAdmin()">İptal</button>`;

  for(let i=0;i<10;i++){
    const inp=document.getElementById(`aw-${i}`);
    const cnt=document.getElementById(`awc-${i}`);
    inp.addEventListener("input",()=>{
      const v=inp.value.toLocaleLowerCase("tr");inp.value=v;
      const len=[...v].length;
      cnt.textContent=`${Math.min(len,5)}/5`;
      cnt.style.color=len===5?"var(--correct)":len>5?"#ef4444":"var(--muted)";
      inp.className="am-word-input"+(len===5?" ok":len>5?" err":"");
    });
  }
  document.getElementById("am-confirm").addEventListener("click",confirmWords);
}

async function confirmWords(){
  const newWords=[];
  for(let i=0;i<10;i++){
    const v=document.getElementById(`aw-${i}`).value.trim().toLocaleLowerCase("tr");
    if([...v].length!==5){toast(`Kelime ${i+1} tam 5 harf olmalı!`);document.getElementById(`aw-${i}`).focus();return;}
    newWords.push(v);
  }
  const btn=document.getElementById("am-confirm");
  btn.disabled=true;btn.textContent="⏳ Kaydediliyor...";
  try{
    const newVer=(SESSION_VER||4)+1;
    await set(ref(db,"wordle_config"),{words:newWords,version:newVer,updatedAt:Date.now()});
    await set(ref(db,"wordle_scores"),null);
    await set(ref(db,"wordle_replays"),null);
    toast("✅ Kelimeler kaydedildi! Sayfa yenileniyor...");
    closeAdmin();
    setTimeout(()=>window.location.reload(),900);
  }catch(err){
    toast("❌ Hata: "+err.message);
    btn.disabled=false;btn.textContent="✅ Onayla ve Sıfırla";
  }
}

window.closeAdmin=function(){document.getElementById("admin-modal").classList.remove("on");}

document.getElementById("admin-modal").addEventListener("click",e=>{
  if(e.target===document.getElementById("admin-modal")) closeAdmin();
});
document.getElementById("replay-modal").addEventListener("click",e=>{
  if(e.target===document.getElementById("replay-modal")) closeReplay();
});

/* UTILS */
const delay=ms=>new Promise(r=>setTimeout(r,ms));
function shakeRow(ri){
  const row=document.getElementById(`row-${ri}`);if(!row)return;
  row.querySelectorAll(".tile").forEach(t=>{t.classList.add("shake");setTimeout(()=>t.classList.remove("shake"),400)});
}
function toast(msg,dur=2500){
  const c=document.getElementById("toast-wrap");
  const d=document.createElement("div");d.className="toast";d.textContent=msg;c.appendChild(d);
  setTimeout(()=>{d.style.transition="opacity .3s";d.style.opacity="0";setTimeout(()=>d.remove(),320)},dur);
}

/* START */
function startSession(){
  session=loadSession()||freshSession();
  buildProgress();buildBoard();buildKeyboard();
  syncAllReplays().catch(()=>{});
  if(session.finished){
    loadQuestion(WORDS.length-1);setTimeout(showFinish,200);
  } else {
    loadQuestion(session.cur);
  }
}

init();
</script>
