<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wordle — Fortunately</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;
  --surface:#12161e;
  --surface2:#1c2230;
  --border:rgba(255,255,255,.08);
  --text:#e8edf5;
  --muted:#6b7a94;
  --accent:#f59e0b;
  --correct:#22c55e;
  --present:#f59e0b;
  --absent:#2a3040;
  --absent-txt:#4a5568;
  --key:#2a3040;
  --r:14px;
}
html,body{height:100%}
body{
  font-family:"Poppins",sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 0%,rgba(245,158,11,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(34,197,94,.05) 0%,transparent 60%);
}

/* AUTH */
#auth-overlay{
  display:flex;position:fixed;inset:0;background:var(--bg);z-index:9999;
  align-items:center;justify-content:center;flex-direction:column;gap:22px;
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(245,158,11,.1) 0%,transparent 60%);
}
.auth-logo{font-family:"Space Mono",monospace;font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:3px}
.auth-sub{font-size:.85rem;color:var(--muted)}
#user-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:460px;width:92%}
.user-btn{
  padding:13px 8px;border:none;border-radius:12px;font-weight:700;font-size:.95rem;
  cursor:pointer;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7);
  box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform .2s,box-shadow .2s;
  font-family:"Poppins",sans-serif;
}
.user-btn:hover{transform:translateY(-4px) scale(1.06);box-shadow:0 12px 28px rgba(0,0,0,.55)}

/* TOPBAR */
#topbar{
  width:100%;height:56px;background:rgba(10,12,16,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:100;gap:12px;
}
.back-btn{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;
  font-size:.8rem;font-family:"Poppins",sans-serif;transition:.2s;
  display:flex;align-items:center;gap:6px;
}
.back-btn:hover{background:rgba(255,255,255,.12)}
.top-logo{font-family:"Space Mono",monospace;font-weight:700;font-size:1rem;color:var(--accent);letter-spacing:2px}
#user-chip{padding:5px 14px;border-radius:20px;font-weight:700;font-size:.8rem;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6)}

/* PROGRESS */
#progress-wrap{width:100%;max-width:560px;padding:18px 20px 0}
#q-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.q-num{font-family:"Space Mono",monospace;font-weight:700;font-size:.85rem;color:var(--accent)}
.q-score{font-family:"Space Mono",monospace;font-weight:700;font-size:.85rem;color:var(--muted)}
.progress-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;display:flex;gap:3px}
.progress-seg{flex:1;height:100%;border-radius:3px;background:var(--surface2);transition:background .4s}
.progress-seg.done-win{background:var(--correct)}
.progress-seg.done-fail{background:#ef4444}
.progress-seg.active{background:var(--accent);animation:pulse-seg 1.2s ease infinite}
@keyframes pulse-seg{0%,100%{opacity:1}50%{opacity:.55}}

/* GAME AREA */
#game-wrap{width:100%;max-width:560px;padding:20px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:16px}

/* BOARD */
#board{display:grid;grid-template-rows:repeat(6,1fr);gap:5px}
.row{display:flex;gap:5px}
.tile{
  width:56px;height:56px;border:2px solid var(--surface2);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:"Space Mono",monospace;font-size:1.55rem;font-weight:700;
  text-transform:uppercase;background:var(--surface);
  transition:border-color .1s;user-select:none;
}
.tile.filled{border-color:rgba(255,255,255,.2)}
.tile.active-cursor{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.tile.shake{animation:shake .38s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.tile.flip{animation:flip .48s ease forwards}
@keyframes flip{0%{transform:rotateX(0)}49%{transform:rotateX(-90deg)}50%{transform:rotateX(-90deg)}100%{transform:rotateX(0)}}
.tile.correct{background:var(--correct);border-color:var(--correct);color:#fff}
.tile.present{background:var(--present);border-color:var(--present);color:#111}
.tile.absent{background:var(--absent);border-color:var(--absent);color:var(--absent-txt)}

/* KEYBOARD */
#keyboard{display:flex;flex-direction:column;gap:6px;align-items:center;width:100%}
.kb-row{display:flex;gap:4px;justify-content:center}
.key{
  height:50px;min-width:34px;padding:0 5px;border-radius:8px;border:none;
  background:var(--key);color:var(--text);
  font-family:"Poppins",sans-serif;font-weight:700;font-size:.78rem;
  cursor:pointer;transition:background .15s,transform .08s,color .15s;
  display:flex;align-items:center;justify-content:center;user-select:none;
}
.key:hover{background:#374151;transform:translateY(-1px)}
.key:active{transform:scale(.93)}
.key.wide{min-width:58px;font-size:.7rem}
.key.correct{background:var(--correct);color:#fff}
.key.present{background:var(--present);color:#111}
.key.absent{background:#1a2030;color:#2a3040}

/* RESULT CARD */
#result-card{
  display:none;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 20px;text-align:center;width:100%;
  animation:fadeUp .35s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.rc-emoji{font-size:2rem;margin-bottom:4px}
.rc-title{font-weight:800;font-size:1.1rem;margin-bottom:2px}
.rc-pts{font-family:"Space Mono",monospace;color:var(--accent);font-size:1.3rem;font-weight:700}
.rc-word{font-family:"Space Mono",monospace;font-size:1rem;color:var(--correct);letter-spacing:3px;font-weight:700;margin-top:6px}

/* NEXT BTN */
#next-btn{
  display:none;
  background:linear-gradient(135deg,var(--correct),#16a34a);
  color:#fff;border:none;padding:13px 36px;border-radius:30px;
  font-weight:700;font-size:1rem;font-family:"Poppins",sans-serif;
  cursor:pointer;box-shadow:0 4px 20px rgba(34,197,94,.35);
  transition:transform .2s,box-shadow .2s;letter-spacing:.5px;
  animation:fadeUp .4s ease;
}
#next-btn:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(34,197,94,.5)}
#next-btn:active{transform:scale(.96)}

/* FINISH SCREEN */
#finish-screen{
  display:none;position:fixed;inset:0;
  background:rgba(10,12,16,.97);backdrop-filter:blur(12px);
  z-index:800;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:20px;
}
#finish-screen.on{display:flex}
.fs-inner{
  max-width:520px;width:100%;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:28px;
  box-shadow:0 16px 60px rgba(0,0,0,.7);
  margin:auto;
}
.fs-title{font-family:"Space Mono",monospace;font-size:1.4rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:4px;letter-spacing:2px}
.fs-sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:20px}
.fs-score-big{text-align:center;font-family:"Space Mono",monospace;font-size:3rem;font-weight:700;color:var(--accent);line-height:1;margin-bottom:4px}
.fs-score-label{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:24px}

/* REVIEW LIST */
.review-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.rv-item{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .2s;
}
.rv-item:hover{border-color:rgba(255,255,255,.18)}
.rv-hdr{display:flex;align-items:center;gap:10px}
.rv-num{font-family:"Space Mono",monospace;font-weight:700;font-size:.78rem;color:var(--muted);width:20px;flex-shrink:0}
.rv-word{font-family:"Space Mono",monospace;font-weight:700;font-size:.88rem;letter-spacing:2px;flex:1}
.rv-badge{padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700;flex-shrink:0}
.rv-badge.win{background:rgba(34,197,94,.15);color:var(--correct);border:1px solid rgba(34,197,94,.3)}
.rv-badge.fail{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.rv-pts{font-family:"Space Mono",monospace;color:var(--accent);font-size:.82rem;font-weight:700;flex-shrink:0}
.rv-chevron{color:var(--muted);font-size:.7rem;transition:transform .2s;margin-left:6px}
.rv-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.rv-item.expanded .rv-body{display:block}
.rv-item.expanded .rv-chevron{transform:rotate(180deg)}
.rv-board{display:flex;flex-direction:column;gap:3px}
.rv-row{display:flex;gap:3px}
.rv-tile{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:"Space Mono",monospace;font-size:.8rem;font-weight:700;text-transform:uppercase}
.rv-tile.c{background:var(--correct);color:#fff}
.rv-tile.p{background:var(--present);color:#111}
.rv-tile.a{background:var(--absent);color:var(--absent-txt)}

/* LEADERBOARD in finish */
.fs-lb-title{font-weight:700;font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;text-align:center}
.fs-lb-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px}
.fs-lb-row.you{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.06)}
.fs-lb-rank{font-family:"Space Mono",monospace;font-size:.8rem;font-weight:700;width:22px;text-align:center;color:var(--muted)}
.fs-lb-rank.g{color:#fbbf24}.fs-lb-rank.s{color:#94a3b8}.fs-lb-rank.b{color:#b45309}
.fs-lb-badge{padding:3px 10px;border-radius:8px;font-size:.72rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.fs-lb-info{flex:1;min-width:0}
.fs-lb-sub{font-size:.65rem;color:var(--muted)}
.fs-lb-pts{font-family:"Space Mono",monospace;font-size:.9rem;font-weight:700;color:var(--accent)}

/* TOAST */
#toast-wrap{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:rgba(232,237,245,.96);color:#0a0c10;padding:9px 22px;border-radius:22px;font-size:.84rem;font-weight:700;box-shadow:0 4px 18px rgba(0,0,0,.5);animation:toastIn .22s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* RESPONSIVE */
@media(max-width:480px){
  .tile{width:46px;height:46px;font-size:1.2rem}
  .key{height:44px;min-width:28px;font-size:.7rem}
  .key.wide{min-width:50px}
  #game-wrap{padding:14px 12px 36px}
  #progress-wrap{padding:14px 12px 0}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-overlay">
  <div style="font-size:2.2rem">⬛🟨🟩</div>
  <div class="auth-logo">WORDLE</div>
  <div class="auth-sub">Kim oynuyor?</div>
  <div id="user-grid"></div>
</div>

<div id="toast-wrap"></div>

<!-- TOPBAR -->
<div id="topbar">
  <button class="back-btn" onclick="window.location.href='index.html'">← Ana Sayfa</button>
  <div class="top-logo">WORDLE</div>
  <div id="user-chip">—</div>
</div>

<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="q-label">
    <span class="q-num" id="q-num-label">Soru 1 / 10</span>
    <span class="q-score" id="q-score-label">0 puan</span>
  </div>
  <div class="progress-track" id="progress-track"></div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <div id="board"></div>
  <div id="result-card">
    <div class="rc-emoji" id="rc-emoji">🎉</div>
    <div class="rc-title" id="rc-title">Harika!</div>
    <div class="rc-pts" id="rc-pts">+5 puan</div>
    <div class="rc-word" id="rc-word"></div>
  </div>
  <button id="next-btn">Sonraki Soru →</button>
  <div id="keyboard"></div>
</div>

<!-- FINISH SCREEN -->
<div id="finish-screen">
  <div class="fs-inner">
    <div class="fs-title">🏁 BİTTİ!</div>
    <div class="fs-sub">10 soruyu tamamladın</div>
    <div class="fs-score-big" id="fs-total">0</div>
    <div class="fs-score-label">/ 60 puan</div>
    <div class="review-list" id="review-list"></div>
    <div class="fs-lb-title">🏆 Genel Puan Tablosu</div>
    <div id="fs-lb"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const FB={apiKey:"AIzaSyCUTBQ5oIgF1GEU8rGj9Mxqz7a2g1Ecswk",authDomain:"timetemp-9b1a5.firebaseapp.com",databaseURL:"https://timetemp-9b1a5-default-rtdb.firebaseio.com/",projectId:"timetemp-9b1a5",storageBucket:"timetemp-9b1a5.firebasestorage.app",messagingSenderId:"580366684921",appId:"1:580366684921:web:2133261bcfccc0a21a0828"};
const app=initializeApp(FB);
const db=getDatabase(app);

/* ══════════════════════════════════
   KELİMELER — sırayla 10 soru
   Max puan: 10 × 6 = 60
══════════════════════════════════ */
const WORDS=["taşak","elçik","lidya","münih","bokan","yorum","lvbel","yakup","cehap","uysal"];

const SESSION_VER=4; // bump if you change WORDS
const SESSION_KEY=`wrd_s_${SESSION_VER}`;

/* ══════════════════════════════════
   USERS
══════════════════════════════════ */
const USERS=[
  {name:"AK",color:"#e74c3c"},{name:"KD",color:"#e67e22"},
  {name:"MA",color:"#2ecc71"},{name:"AKK",color:"#9b59b6"},
  {name:"HAC",color:"#f1c40f"},{name:"KBE",color:"#95a5a6"},
  {name:"BB",color:"#3498db"},{name:"ÖÖ",color:"#8d6e63"}
];
const LIGHT=new Set(["HAC","KBE"]);
let curUser=JSON.parse(localStorage.getItem("curUser")||"null");

const authEl=document.getElementById("auth-overlay");
if(curUser){authEl.style.display="none";applyChip()}
else{
  const grid=document.getElementById("user-grid");
  USERS.forEach(u=>{
    const b=document.createElement("button");b.className="user-btn";
    b.style.background=u.color;b.textContent=u.name;
    if(LIGHT.has(u.name)){b.style.color="#000";b.style.textShadow="none"}
    b.addEventListener("click",()=>{
      curUser=u;localStorage.setItem("curUser",JSON.stringify(u));
      authEl.style.display="none";applyChip();startSession();
    });
    grid.appendChild(b);
  });
}
function applyChip(){
  const chip=document.getElementById("user-chip");
  chip.textContent=curUser.name;chip.style.background=curUser.color;
  if(LIGHT.has(curUser.name)){chip.style.color="#000";chip.style.textShadow="none"}
}

/* ══════════════════════════════════
   SESSION
══════════════════════════════════ */
function freshSession(){
  return{
    v:SESSION_VER,
    q:WORDS.map(()=>({guesses:[],done:false,won:false,pts:0})),
    total:0,cur:0,finished:false
  };
}
function loadSession(){
  try{
    const s=JSON.parse(localStorage.getItem(SESSION_KEY)||"null");
    if(!s||s.v!==SESSION_VER||!s.q||s.q.length!==WORDS.length) return null;
    return s;
  }catch{return null}
}
function save(){localStorage.setItem(SESSION_KEY,JSON.stringify(session))}

let session=null;
let currentGuess="";
let qDone=false;

/* ══════════════════════════════════
   PROGRESS
══════════════════════════════════ */
function buildProgress(){
  const t=document.getElementById("progress-track");t.innerHTML="";
  for(let i=0;i<WORDS.length;i++){
    const s=document.createElement("div");s.className="progress-seg";s.id=`seg-${i}`;t.appendChild(s);
  }
}
function updateProgress(){
  const cur=session.cur;
  for(let i=0;i<WORDS.length;i++){
    const s=document.getElementById(`seg-${i}`);if(!s)continue;
    const qd=session.q[i];
    if(i<cur) s.className="progress-seg "+(qd.won?"done-win":"done-fail");
    else if(i===cur&&!session.finished) s.className="progress-seg active";
    else s.className="progress-seg";
  }
  document.getElementById("q-num-label").textContent=
    session.finished?"Tamamlandı ✓":`Soru ${cur+1} / ${WORDS.length}`;
  document.getElementById("q-score-label").textContent=`${session.total} puan`;
}

/* ══════════════════════════════════
   BOARD
══════════════════════════════════ */
function buildBoard(){
  const b=document.getElementById("board");b.innerHTML="";
  for(let r=0;r<6;r++){
    const row=document.createElement("div");row.className="row";row.id=`row-${r}`;
    for(let c=0;c<5;c++){
      const t=document.createElement("div");t.className="tile";t.id=`t-${r}-${c}`;row.appendChild(t);
    }
    b.appendChild(row);
  }
}
function clearBoard(){
  for(let r=0;r<6;r++) for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${r}-${c}`);
    if(t){t.className="tile";t.textContent=""}
  }
}
function renderSaved(guesses,target){
  guesses.forEach((g,ri)=>{
    const res=scoreGuess(g,target);
    g.split("").forEach((ch,ci)=>{
      const t=document.getElementById(`t-${ri}-${ci}`);
      if(!t)return;
      t.textContent=ch.toLocaleUpperCase("tr");t.classList.add(res[ci]);
    });
  });
  updateKeys(guesses,target);
}

/* ══════════════════════════════════
   KEYBOARD
══════════════════════════════════ */
const TR_KB=[
  ["e","r","t","y","u","ı","o","p","ğ","ü"],
  ["a","s","d","f","g","h","j","k","l","ş","i"],
  ["ENTER","z","x","c","v","b","n","m","ö","ç","⌫"]
];
function buildKeyboard(){
  const kb=document.getElementById("keyboard");kb.innerHTML="";
  TR_KB.forEach(row=>{
    const rowEl=document.createElement("div");rowEl.className="kb-row";
    row.forEach(k=>{
      const btn=document.createElement("button");btn.className="key";
      if(k==="ENTER"||k==="⌫") btn.classList.add("wide");
      btn.textContent=k;btn.dataset.key=k;
      btn.addEventListener("click",()=>handleKey(k));
      rowEl.appendChild(btn);
    });
    kb.appendChild(rowEl);
  });
}
function clearKeys(){
  document.querySelectorAll(".key").forEach(b=>{
    b.className="key";if(b.dataset.key==="ENTER"||b.dataset.key==="⌫") b.classList.add("wide");
  });
}
function updateKeys(guesses,target){
  const map={};
  guesses.forEach(g=>{
    const r=scoreGuess(g,target);
    g.split("").forEach((ch,i)=>{
      if(r[i]==="correct") map[ch]="correct";
      else if(r[i]==="present"&&map[ch]!=="correct") map[ch]="present";
      else if(!map[ch]) map[ch]="absent";
    });
  });
  document.querySelectorAll(".key").forEach(btn=>{
    const k=btn.dataset.key;
    if(map[k]){btn.className="key";if(k==="ENTER"||k==="⌫") btn.classList.add("wide");btn.classList.add(map[k])}
  });
}

/* ══════════════════════════════════
   SCORING
══════════════════════════════════ */
function scoreGuess(guess,target){
  const res=Array(5).fill("absent");
  const ta=target.split("");const used=Array(5).fill(false);
  for(let i=0;i<5;i++) if(guess[i]===target[i]){res[i]="correct";used[i]=true}
  for(let i=0;i<5;i++){
    if(res[i]==="correct")continue;
    for(let j=0;j<5;j++){if(!used[j]&&guess[i]===ta[j]){res[i]="present";used[j]=true;break}}
  }
  return res;
}
function calcPts(attempts,won){return won?Math.max(1,7-attempts):0}

/* ══════════════════════════════════
   LOAD QUESTION
══════════════════════════════════ */
function loadQuestion(qi){
  const qd=session.q[qi];
  const target=WORDS[qi];
  clearBoard();clearKeys();
  currentGuess="";qDone=qd.done;
  document.getElementById("result-card").style.display="none";
  document.getElementById("next-btn").style.display="none";
  if(qd.guesses.length) renderSaved(qd.guesses,target);
  const kb=document.getElementById("keyboard");
  if(qd.done){
    showResultCard(qi,false);
    if(!session.finished) showNextBtn(qi);
    kb.style.opacity=".35";kb.style.pointerEvents="none";
  } else {
    kb.style.opacity="1";kb.style.pointerEvents="";
  }
  updateProgress();
}

/* ══════════════════════════════════
   INPUT
══════════════════════════════════ */
document.addEventListener("keydown",e=>{
  if(authEl.style.display!=="none") return;
  if(document.getElementById("finish-screen").classList.contains("on")) return;
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  const k=e.key;
  if(k==="Enter") handleKey("ENTER");
  else if(k==="Backspace") handleKey("⌫");
  else if(/^[a-zA-ZğüşıöçĞÜŞİÖÇ]$/.test(k)) handleKey(k.toLocaleLowerCase("tr"));
});

function handleKey(k){
  if(qDone) return;
  const qd=session.q[session.cur];
  if(k==="⌫"){
    if(currentGuess.length>0){currentGuess=currentGuess.slice(0,-1);renderCurrent(qd.guesses.length)}
  } else if(k==="ENTER"){
    submitGuess();
  } else {
    if(currentGuess.length<5){currentGuess+=k.toLocaleLowerCase("tr");renderCurrent(qd.guesses.length)}
  }
}

function renderCurrent(ri){
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${ri}-${c}`);if(!t)return;
    const ch=currentGuess[c]||"";
    t.textContent=ch?ch.toLocaleUpperCase("tr"):"";
    t.className="tile"+(ch?" filled":"")+(c===currentGuess.length&&!ch?" active-cursor":"");
  }
}

/* ══════════════════════════════════
   SUBMIT
══════════════════════════════════ */
async function submitGuess(){
  const qi=session.cur;
  const qd=session.q[qi];
  const target=WORDS[qi];
  if(currentGuess.length<5){shakeRow(qd.guesses.length);toast("5 harf lazım!");return}

  const ri=qd.guesses.length;
  const res=scoreGuess(currentGuess,target);
  qd.guesses.push(currentGuess);

  for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${ri}-${c}`);
    await delay(c*80);
    t.classList.add("flip");
    await delay(240);
    t.classList.remove("flip","active-cursor","filled");
    t.classList.add(res[c]);
  }

  updateKeys(qd.guesses,target);
  currentGuess="";
  // clear active-cursor from next row
  for(let c=0;c<5;c++){const t=document.getElementById(`t-${ri+1}-${c}`);if(t) t.className="tile"}

  const won=res.every(r=>r==="correct");
  if(won||qd.guesses.length===6){
    const pts=calcPts(qd.guesses.length,won);
    qd.done=true;qd.won=won;qd.pts=pts;
    session.total+=pts;
    qDone=true;
    save();
    document.getElementById("keyboard").style.opacity=".35";
    document.getElementById("keyboard").style.pointerEvents="none";
    updateProgress();
    showResultCard(qi,true);
    if(qi===WORDS.length-1){
      session.finished=true;save();
      await saveToFirebase();
      setTimeout(showFinish,1400);
    } else {
      showNextBtn(qi);
    }
  }
}

/* ══════════════════════════════════
   RESULT CARD
══════════════════════════════════ */
function showResultCard(qi,animate){
  const qd=session.q[qi];
  const target=WORDS[qi];
  const card=document.getElementById("result-card");
  const winEmojis=["🤯","😎","🔥","👏","👍","😅"];
  const winTitles=["Muhteşem!","Harika!","Süper!","Güzel!","Nefes kesti!","Son nefeste!"];
  document.getElementById("rc-emoji").textContent=qd.won?winEmojis[qd.guesses.length-1]||"🎉":"😢";
  document.getElementById("rc-title").textContent=qd.won?winTitles[qd.guesses.length-1]||"Harika!":"Bulamadın!";
  document.getElementById("rc-pts").textContent=qd.pts>0?`+${qd.pts} puan`:"0 puan";
  const wordEl=document.getElementById("rc-word");
  if(!qd.won){wordEl.textContent=target.toLocaleUpperCase("tr");wordEl.style.display="block"}
  else wordEl.style.display="none";
  card.style.animation=animate?"fadeUp .35s ease":"none";
  card.style.display="block";
}

function showNextBtn(qi){
  const btn=document.getElementById("next-btn");
  btn.style.display="inline-block";
  btn.textContent=qi<WORDS.length-2?"Sonraki Soru →":"Sonuçları Gör 🏁";
}

document.getElementById("next-btn").addEventListener("click",()=>{
  if(!qDone) return;
  const qi=session.cur;
  if(qi>=WORDS.length-1){showFinish();return}
  session.cur=qi+1;save();
  loadQuestion(session.cur);
});

/* ══════════════════════════════════
   FINISH
══════════════════════════════════ */
function showFinish(){
  updateProgress();
  document.getElementById("finish-screen").classList.add("on");
  document.getElementById("fs-total").textContent=session.total;
  buildReview();
  listenLB();
}

function buildReview(){
  const list=document.getElementById("review-list");list.innerHTML="";
  WORDS.forEach((word,i)=>{
    const qd=session.q[i];
    const item=document.createElement("div");item.className="rv-item";
    const hdr=document.createElement("div");hdr.className="rv-hdr";
    hdr.innerHTML=`
      <span class="rv-num">${i+1}</span>
      <span class="rv-word">${word.toLocaleUpperCase("tr")}</span>
      <span class="rv-badge ${qd.won?"win":"fail"}">${qd.won?qd.guesses.length+"/6":"✗"}</span>
      <span class="rv-pts">${qd.pts>0?"+"+qd.pts:"0"}pt</span>
      <span class="rv-chevron">▼</span>`;
    const body=document.createElement("div");body.className="rv-body";
    const board=document.createElement("div");board.className="rv-board";
    if(qd.guesses.length){
      qd.guesses.forEach(g=>{
        const res=scoreGuess(g,word);
        const row=document.createElement("div");row.className="rv-row";
        g.split("").forEach((ch,ci)=>{
          const t=document.createElement("div");t.className=`rv-tile ${res[ci][0]}`;
          t.textContent=ch.toLocaleUpperCase("tr");row.appendChild(t);
        });
        board.appendChild(row);
      });
    } else {
      board.innerHTML='<span style="font-size:.78rem;color:var(--muted)">Deneme yapılmadı</span>';
    }
    body.appendChild(board);
    item.appendChild(hdr);item.appendChild(body);
    item.addEventListener("click",()=>item.classList.toggle("expanded"));
    list.appendChild(item);
  });
}

/* ══════════════════════════════════
   FIREBASE
══════════════════════════════════ */
async function saveToFirebase(){
  if(!curUser) return;
  const r=ref(db,`wordle_scores/${curUser.name}`);
  const snap=await get(r);
  const prev=snap.val()||{total:0,played:0,name:curUser.name,color:curUser.color};
  await set(r,{total:(prev.total||0)+session.total,played:(prev.played||0)+1,name:curUser.name,color:curUser.color});
}

function listenLB(){
  onValue(ref(db,"wordle_scores"),snap=>renderLB(snap.val()||{}));
}

function renderLB(data){
  const el=document.getElementById("fs-lb");el.innerHTML="";
  const entries=Object.values(data).sort((a,b)=>b.total-a.total);
  if(!entries.length){el.innerHTML='<div style="text-align:center;padding:12px;opacity:.5;font-size:.82rem">Henüz puan yok.</div>';return}
  const medals=["🥇","🥈","🥉"];const rankCls=["g","s","b"];
  entries.forEach((e,i)=>{
    const row=document.createElement("div");
    row.className="fs-lb-row"+(e.name===curUser?.name?" you":"");
    const fc=LIGHT.has(e.name)?"#000":"#fff";
    row.innerHTML=`
      <div class="fs-lb-rank ${rankCls[i]||""}">${medals[i]||`#${i+1}`}</div>
      <span class="fs-lb-badge" style="background:${e.color};color:${fc}">${e.name}</span>
      <div class="fs-lb-info"><div class="fs-lb-sub">${e.played} oyun</div></div>
      <div class="fs-lb-pts">${e.total}<span style="font-size:.65rem;color:var(--muted)">pt</span></div>`;
    el.appendChild(row);
  });
}

/* ══════════════════════════════════
   UTILS
══════════════════════════════════ */
const delay=ms=>new Promise(r=>setTimeout(r,ms));

function shakeRow(ri){
  const row=document.getElementById(`row-${ri}`);if(!row)return;
  row.querySelectorAll(".tile").forEach(t=>{t.classList.add("shake");setTimeout(()=>t.classList.remove("shake"),400)});
}

function toast(msg,dur=2000){
  const c=document.getElementById("toast-wrap");
  const d=document.createElement("div");d.className="toast";d.textContent=msg;c.appendChild(d);
  setTimeout(()=>{d.style.transition="opacity .3s";d.style.opacity="0";setTimeout(()=>d.remove(),320)},dur);
}

/* ══════════════════════════════════
   START
══════════════════════════════════ */
function startSession(){
  session=loadSession()||freshSession();
  buildProgress();buildBoard();buildKeyboard();
  if(session.finished){
    // Restore last question visually, then show finish
    loadQuestion(WORDS.length-1);
    setTimeout(showFinish,200);
  } else {
    loadQuestion(session.cur);
  }
}

if(curUser) startSession();
</script>
